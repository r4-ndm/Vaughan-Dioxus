<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vaughan dApp Browser</title>
  <style>
    :root {
      --bg: #000000;
      --fg: #e6e6e6;
      --muted: rgba(230, 230, 230, 0.70);
      --border: #222222;
      --card: #0b0b0b;
      --card-2: #121212;
      --accent: #1a1a1a;

      --radius: 0px;
      --space-1: 6px;
      --space-2: 10px;
      --space-3: 16px;
      --space-4: 24px;

      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --font-sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: var(--space-2);
      background: var(--card-2);
      border-bottom: 1px solid var(--border);
    }
    button {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 9px 10px;
      border-radius: var(--radius);
      outline: none;
    }
    input::placeholder {
      color: var(--muted);
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--border);
    }
    .dot.connected {
      background: var(--accent);
    }
    .dot.error {
      background: #ff4d4d;
    }
    .content {
      width: 100%;
      height: calc(100vh - 54px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
  </style>
</head>
<body>
  <header>
    <button id="backBtn" disabled>◀</button>
    <button id="fwdBtn" disabled>▶</button>
    <button id="refreshBtn">⟳</button>

    <input id="addressBar" placeholder="Enter URL (e.g. https://example.com)" />

    <div class="status" id="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Not connected</span>
    </div>
  </header>

  <div class="content">
    <iframe id="webview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <script>
    function tauriInvoke(cmd, args) {
      const inv =
        window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke
          ? window.__TAURI__.core.invoke
          : window.__TAURI__ && window.__TAURI__.invoke
          ? window.__TAURI__.invoke
          : null;
      if (!inv) return Promise.reject(new Error("Tauri invoke not available"));
      return inv(cmd, args);
    }

      // ------------------------------------------------------------
      // EIP-1193 provider injection (Task 30.7)
      // ------------------------------------------------------------

      function makeEthRpcError(code, message) {
        const err = new Error(message);
        err.code = code;
        return err;
      }

      function createEmitter() {
        const listeners = new Map();
        return {
          on(event, handler) {
            const arr = listeners.get(event) ?? [];
            arr.push(handler);
            listeners.set(event, arr);
          },
          removeListener(event, handler) {
            const arr = listeners.get(event) ?? [];
            listeners.set(
              event,
              arr.filter((h) => h !== handler)
            );
          },
          emit(event, payload) {
            const arr = listeners.get(event) ?? [];
            for (const h of arr) {
              try {
                h(payload);
              } catch (e) {
                // Best-effort: never crash the dApp due to user handler bugs.
                console.error(e);
              }
            }
          },
        };
      }

      const emitter = createEmitter();

      let currentAccounts = [];
      let currentChainIdHex = null;
      let firstConnectEmitted = false;

      async function fetchNetworkInfo() {
        const resp = await tauriInvoke("ipc_request", {
          request: { type: "GetNetworkInfo" },
        });
        if (resp?.type === "NetworkInfo") return resp.payload;
        throw makeEthRpcError(4100, "Wallet not connected");
      }

      async function fetchAccounts() {
        const resp = await tauriInvoke("ipc_request", {
          request: { type: "GetAccounts" },
        });
        if (resp?.type === "Accounts") return resp.payload.map((a) => a.address);
        throw makeEthRpcError(4100, "Wallet not connected");
      }

      function toHexChainId(dec) {
        try {
          const n = typeof dec === "string" ? BigInt(dec) : BigInt(dec);
          return "0x" + n.toString(16);
        } catch {
          return "0x0";
        }
      }

      // Inject provider into the page context.
      // Note: in this early browser foundation, the webview chrome uses an iframe;
      // full cross-origin dApp injection will be completed in later Task 30.x steps.
      window.ethereum = {
        isMetaMask: true,
        request: async ({ method, params } = {}) => {
          const m = (method ?? "").toLowerCase();
          try {
            if (m === "eth_requestaccounts" || m === "eth_accounts") {
              const accounts = await fetchAccounts();
              currentAccounts = accounts;
              emitter.emit("accountsChanged", accounts);

              if (!firstConnectEmitted) {
                firstConnectEmitted = true;
                emitter.emit("connect", { chainId: currentChainIdHex, accounts });
              }
              return accounts;
            }

            if (m === "eth_chainid") {
              const net = await fetchNetworkInfo();
              currentChainIdHex = toHexChainId(net.chain_id);
              emitter.emit("chainChanged", currentChainIdHex);
              return currentChainIdHex;
            }

            if (m === "wallet_switchethereumchain") {
              const chainId = params?.[0]?.chainId;
              if (!chainId) {
                throw makeEthRpcError(4001, "Missing chainId");
              }

              // Accept `0x...` or decimal strings.
              let decChainId;
              if (typeof chainId === "string" && chainId.startsWith("0x")) {
                decChainId = BigInt(chainId).toString();
              } else {
                decChainId = BigInt(chainId).toString();
              }

              const resp = await tauriInvoke("ipc_request", {
                request: { type: "SwitchChain", payload: { chain_id: Number(decChainId) } },
              });
              if (resp?.type === "Error") throw makeEthRpcError(4200, resp.payload?.message ?? "Switch failed");

              const net = await fetchNetworkInfo();
              currentChainIdHex = toHexChainId(net.chain_id);
              emitter.emit("chainChanged", currentChainIdHex);

              return null;
            }

            throw makeEthRpcError(4200, `Unsupported method: ${method}`);
          } catch (e) {
            // Surface EIP-1193 style errors.
            throw e;
          }
        },
        on: (event, handler) => emitter.on(event, handler),
        removeListener: (event, handler) => emitter.removeListener(event, handler),
      };

    const backBtn = document.getElementById("backBtn");
    const fwdBtn = document.getElementById("fwdBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const addressBar = document.getElementById("addressBar");
    const iframe = document.getElementById("webview");

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    let historyStack = [];
    let historyIndex = -1;

    function setStatus(variant, text) {
      statusDot.classList.remove("connected");
      statusDot.classList.remove("error");
      if (variant === "connected") statusDot.classList.add("connected");
      if (variant === "error") statusDot.classList.add("error");
      statusText.textContent = text;
    }

    function navigate(url, { push = true } = {}) {
      if (!url) return;
      const normalized = url.trim();
      if (!normalized) return;

      if (push) {
        // Drop forward history on new navigation.
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(normalized);
        historyIndex = historyStack.length - 1;
      }

      iframe.src = normalized;
      addressBar.value = normalized;

      backBtn.disabled = historyIndex <= 0;
      fwdBtn.disabled = historyIndex >= historyStack.length - 1;
    }

    backBtn.addEventListener("click", () => {
      if (historyIndex <= 0) return;
      historyIndex -= 1;
      navigate(historyStack[historyIndex], { push: false });
    });

    fwdBtn.addEventListener("click", () => {
      if (historyIndex >= historyStack.length - 1) return;
      historyIndex += 1;
      navigate(historyStack[historyIndex], { push: false });
    });

    refreshBtn.addEventListener("click", () => {
      if (!iframe.src) return;
      // Refresh by re-setting src.
      const current = iframe.src;
      iframe.src = "about:blank";
      setTimeout(() => (iframe.src = current), 50);
    });

    addressBar.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      let url = addressBar.value.trim();
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;
      navigate(url);
    });

    async function checkConnection() {
      try {
        setStatus(null, "Connecting...");

        // Prime connection state so the provider can immediately answer calls.
        const net = await fetchNetworkInfo();
        currentChainIdHex = toHexChainId(net.chain_id);
        emitter.emit("chainChanged", currentChainIdHex);

        const accounts = await fetchAccounts();
        currentAccounts = accounts;
        emitter.emit("accountsChanged", accounts);

        if (!firstConnectEmitted) {
          firstConnectEmitted = true;
          emitter.emit("connect", { chainId: currentChainIdHex, accounts });
        }

        setStatus(
          "connected",
          `Connected to network: ${net.name} (${net.chain_id})`
        );
      } catch (e) {
        setStatus("error", `IPC unavailable`);
      }
    }

    // Start on load.
    checkConnection().finally(() => {
      // Default to about:blank; user can paste a URL.
      navigate("about:blank", { push: false });
    });
  </script>
</body>
</html>
